---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [ "tar.gz" ]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [ "zip" ]

nfpms:
  - homepage: https://github.com/voxpupuli/gorge
    maintainer: Vox Pupuli <voxpupuli@groups.io>
    description: |-
      Gorge is a Puppet Forge implementation in Go.
    license: Apache 2.0
    formats:
      - apk
      - deb
      - rpm
      - termux.deb
      - archlinux
    provides:
      - gorge
    contents:
      - src: gorge.service
        dst: /usr/lib/systemd/system/gorge.service
      - src: defaults.yaml
        dst: /etc/gorge.yaml
        type: "config|noreplace"

dockers_v2:
  - images:
      - "ghcr.io/voxpupuli/{{ .ProjectName }}"
    tags:
      - "{{ .Version }}"
      - "{{ .Major }}.{{ .Minor }}"
      - "{{ .Major }}"
      - "latest"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.authors: "voxpupuli"
      org.opencontainers.image.url: "https://github.com/voxpupuli/{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.version: "{{ .Version }}"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^Merge'
